services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: brightcrawler
      POSTGRES_USER: crawler
      POSTGRES_PASSWORD: crawler
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawler -d brightcrawler"]
      interval: 5s
      timeout: 5s
      retries: 10

  crawler:
    profiles: ["full"]
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__CrawlDb: Host=postgres;Port=5432;Database=brightcrawler;Username=crawler;Password=crawler
    volumes:
      - ./output:/app/output
    command: ["crawl", "https://example.com"]

volumes:
  pgdata:
